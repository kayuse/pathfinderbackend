services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: pathfinder
      POSTGRES_DB: pathfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder -d pathfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pathfinder:pathfinder@postgres:5432/pathfinder
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
